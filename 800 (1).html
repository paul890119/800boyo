<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博幼 800 單 - 線上對戰版</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 Babel 編譯器 (讓瀏覽器能直接看懂 React JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 設定套件匯入路徑 (Import Map) 包含 React, Lucide 圖示 與 Firebase -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://esm.sh/firebase@10.8.0/app",
        "firebase/auth": "https://esm.sh/firebase@10.8.0/auth",
        "firebase/firestore": "https://esm.sh/firebase@10.8.0/firestore"
      }
    }
  </script>

  <style>
    /* 隱藏滾動條但保留功能 */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      75% { transform: translateX(-10px); }
    }
    .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; opacity: 0; }
    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
  </style>
</head>
<body class="bg-slate-900 m-0 p-0 font-sans text-white">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useCallback, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Play, BookOpen, Keyboard, MousePointerClick, Shuffle, 
      RotateCcw, Check, X, Heart, Pause, Zap, Clock, 
      ArrowLeft, Home, Trophy, Star, Moon, Sun, Award, BarChart3, Settings,
      Globe, Cloud, CloudOff, Volume2, Bookmark, Flame, Gift, ShoppingBag, Shield, Crown, UserCog, Lock, Swords, Users
    } from 'lucide-react';

    // --- Firebase 雲端模組引入 ---
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot } from 'firebase/firestore';

    // ==========================================
    // 0. 💡 教師請注意：請在這裡填寫您的 Firebase 設定！
    // ==========================================
    // 把下面這段替換成您在 Firebase 後台拿到的真實設定，雲端存檔跟對戰就會啟動！
    const firebaseConfig = {
      // apiKey: "AIzaSy...",
      // authDomain: "boyo-800.firebaseapp.com",
      // projectId: "boyo-800",
      // storageBucket: "boyo-800.appspot.com",
      // messagingSenderId: "12345678",
      // appId: "1:123456:web:abcd"
    };

    let app, auth, db, appId = 'boyo-800-app';
    try {
      if (Object.keys(firebaseConfig).length > 0) {
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
      }
    } catch (e) {
      console.warn("Firebase 初始化失敗", e);
    }

    // ==========================================
    // 1. 遊戲資料與常數設定
    // ==========================================
    const VOCABULARY = {
      1: [
        { en: "apple", zh: "蘋果" }, { en: "book", zh: "書本" }, 
        { en: "cat", zh: "貓" }, { en: "dog", zh: "狗" }, 
        { en: "egg", zh: "蛋" }, { en: "fish", zh: "魚" },
        { en: "girl", zh: "女孩" }, { en: "hand", zh: "手" },
        { en: "ice", zh: "冰" }, { en: "juice", zh: "果汁" }
      ],
      2: [
        { en: "key", zh: "鑰匙" }, { en: "lion", zh: "獅子" },
        { en: "monkey", zh: "猴子" }, { en: "nose", zh: "鼻子" },
        { en: "orange", zh: "橘子" }, { en: "pig", zh: "豬" },
        { en: "queen", zh: "皇后" }, { en: "rabbit", zh: "兔子" },
        { en: "sun", zh: "太陽" }, { en: "tree", zh: "樹" }
      ],
      3: [
        { en: "umbrella", zh: "雨傘" }, { en: "van", zh: "箱型車" },
        { en: "water", zh: "水" }, { en: "x-ray", zh: "X光" },
        { en: "yellow", zh: "黃色" }, { en: "zoo", zh: "動物園" },
        { en: "boy", zh: "男孩" }, { en: "cup", zh: "杯子" },
        { en: "desk", zh: "書桌" }, { en: "eye", zh: "眼睛" }
      ]
    };

    for (let i = 4; i <= 40; i++) {
      VOCABULARY[i] = Array(10).fill(null).map((_, idx) => ({
        en: `word${i}_${idx}`, zh: `第${i}課單字${idx+1}`
      }));
    }

    const MODES = {
      recognition: { id: 'recognition', name: '認讀測驗', icon: MousePointerClick, desc: '看英文選中文', color: 'bg-blue-500' },
      scramble: { id: 'scramble', name: '字母重組', icon: Shuffle, desc: '拼湊散落的字母', color: 'bg-purple-500' },
      spelling: { id: 'spelling', name: '拼字測驗', icon: Keyboard, desc: '看中文打英文', color: 'bg-rose-500' }
    };

    const DIFFICULTIES = {
      easy: { id: 'easy', name: '簡單', timeRatio: 1.5, lives: 5, scoreMultiplier: 1, color: 'text-green-500' },
      normal: { id: 'normal', name: '普通', timeRatio: 1.0, lives: 3, scoreMultiplier: 1.5, color: 'text-blue-500' },
      hard: { id: 'hard', name: '困難', timeRatio: 0.6, lives: 2, scoreMultiplier: 2.5, color: 'text-rose-500' }
    };

    const ACHIEVEMENTS = [
      { id: 'first_win', name: '初試啼聲', desc: '完成第一場遊戲', icon: '🎮' },
      { id: 'streak_10', name: '十連勝', desc: '連續完成 10 場遊戲', icon: '🔥' },
      { id: 'perfect', name: '完美無缺', desc: '滿血通關一個課程', icon: '✨' },
      { id: 'all_modes', name: '全能戰士', desc: '完成所有三種模式', icon: '🏆' },
      { id: 'collector_50', name: '集卡達人', desc: '獲得 50 個星星', icon: '⭐' },
      { id: 'cloud_sync', name: '連接世界', desc: '成功同步至雲端', icon: '🌍' },
      { id: 'battle_winner', name: '競技場贏家', desc: '在多人連線對戰中獲勝', icon: '⚔️' }
    ];

    const REWARDS = [
      { id: 'title_master', name: '稱號：單字大師', cost: 15, icon: '👑', desc: '在排行榜顯示尊貴稱號', type: 'cosmetic' },
      { id: 'gold_avatar', name: '黃金大頭貼', cost: 30, icon: '🖼️', desc: '將您的頭像框升級為黃金版', type: 'cosmetic' },
      { id: 'lucky_star', name: '幸運星加成', cost: 60, icon: '🌟', desc: '永久獲得額外 10% 遊戲分數', type: 'buff' },
      { id: 'extra_life', name: '生命護身符', cost: 100, icon: '❤️', desc: '所有遊戲模式初始生命永久 +1', type: 'buff' }
    ];

    // ==========================================
    // 2. 輔助與音效函式
    // ==========================================
    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    const playSound = (type) => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        if (type === 'correct') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'wrong') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(300, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start(); osc.stop(ctx.currentTime + 0.2);
        }
      } catch(e) {}
    };

    const speakWord = (text) => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
      }
    };

    const generateRoomCode = () => {
      return Math.floor(1000 + Math.random() * 9000).toString();
    };

    // ==========================================
    // 3. 主應用程式組件 (與 React 程式碼完全相同)
    // ==========================================
    function App() {
      const [screen, setScreen] = useState('home'); 
      const [theme, setTheme] = useState('dark');
      const [selectedLesson, setSelectedLesson] = useState(1);
      const [selectedMode, setSelectedMode] = useState('recognition');
      const [difficulty, setDifficulty] = useState('normal');

      const [user, setUser] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      const [leaderboard, setLeaderboard] = useState([]);
      
      const [roomId, setRoomId] = useState('');
      const [battleRole, setBattleRole] = useState(null);

      const [progress, setProgress] = useState({
        playerName: `Student_${Math.floor(Math.random()*1000)}`,
        totalScore: 0,
        stars: 0,
        spentStars: 0,
        unlockedRewards: [],
        gamesPlayed: 0,
        gamesWon: 0,
        winStreak: 0,
        lessonStars: {}, 
        achievements: [], 
        history: [],
        wrongWordsList: {} 
      });

      const availableStars = Math.max(0, progress.stars - (progress.spentStars || 0));

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (error) {
            console.error("認證失敗:", error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => setUser(currentUser));
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        const loadProgress = async () => {
          const saved = localStorage.getItem('boyoGameProgressOnline_v5');
          let currentProgress = progress;
          if (saved) {
            try { 
              currentProgress = JSON.parse(saved);
              setProgress(currentProgress); 
            } catch (e) {}
          }

          if (user && db) {
            setIsSyncing(true);
            try {
              const saveRef = doc(collection(db, 'artifacts', appId, 'users', user.uid, 'saves'), 'progress');
              const docSnap = await getDoc(saveRef);
              if (docSnap.exists()) {
                const cloudData = docSnap.data();
                if (cloudData.totalScore > currentProgress.totalScore) {
                  setProgress({ ...cloudData, spentStars: cloudData.spentStars || 0, unlockedRewards: cloudData.unlockedRewards || [] });
                  localStorage.setItem('boyoGameProgressOnline_v5', JSON.stringify(cloudData));
                }
              }
              if (!currentProgress.achievements.includes('cloud_sync')) {
                 checkAchievements({...currentProgress}, null, true);
              }
            } catch (e) {
              console.error("讀取雲端失敗", e);
            }
            setIsSyncing(false);
          }
        };
        loadProgress();
      }, [user]);

      useEffect(() => {
        if (!user || !db) return;
        const lbRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
        const unsubscribe = onSnapshot(lbRef, (snapshot) => {
          const topPlayers = [];
          snapshot.forEach(doc => topPlayers.push({ id: doc.id, ...doc.data() }));
          topPlayers.sort((a, b) => b.totalScore - a.totalScore);
          setLeaderboard(topPlayers);
        }, (error) => console.error("排行榜讀取失敗:", error));
        
        return () => unsubscribe();
      }, [user]);

      const saveProgress = async (newProgress) => {
        setProgress(newProgress);
        localStorage.setItem('boyoGameProgressOnline_v5', JSON.stringify(newProgress));

        if (user && db) {
          setIsSyncing(true);
          try {
            const saveRef = doc(collection(db, 'artifacts', appId, 'users', user.uid, 'saves'), 'progress');
            await setDoc(saveRef, newProgress);

            const topWrongWords = Object.values(newProgress.wrongWordsList)
              .sort((a,b) => b.count - a.count)
              .slice(0, 3)
              .map(w => w.en);

            const publicLBPRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard'), user.uid);
            await setDoc(publicLBPRef, {
              displayName: newProgress.playerName,
              totalScore: newProgress.totalScore,
              stars: newProgress.stars,
              achievementsCount: newProgress.achievements.length,
              unlockedRewards: newProgress.unlockedRewards || [],
              topWrongWords: topWrongWords,
              updatedAt: new Date().toISOString()
            });
          } catch (error) {
            console.error("雲端同步失敗", error);
          }
          setIsSyncing(false);
        }
      };

      const changePlayerName = (newName) => {
        if(!newName.trim()) return;
        saveProgress({...progress, playerName: newName.substring(0,10)});
      };

      const purchaseReward = (reward) => {
        if (availableStars >= reward.cost && !progress.unlockedRewards.includes(reward.id)) {
          const newProgress = {
            ...progress,
            spentStars: (progress.spentStars || 0) + reward.cost,
            unlockedRewards: [...(progress.unlockedRewards || []), reward.id]
          };
          saveProgress(newProgress);
          alert(`🎉 成功兌換：${reward.name}！`);
        } else {
          alert('星星不足或已兌換過！');
        }
      };

      const checkAchievements = (currentProgress, gameResult = null, forceCloud = false, isBattleWin = false) => {
        const unlocked = new Set(currentProgress.achievements);
        if (currentProgress.gamesPlayed >= 1 && !unlocked.has('first_win')) unlocked.add('first_win');
        if (currentProgress.winStreak >= 10 && !unlocked.has('streak_10')) unlocked.add('streak_10');
        if (gameResult && gameResult.lives === DIFFICULTIES[gameResult.difficulty].lives && gameResult.won && !unlocked.has('perfect')) unlocked.add('perfect');
        if (currentProgress.stars >= 50 && !unlocked.has('collector_50')) unlocked.add('collector_50');
        if (forceCloud && !unlocked.has('cloud_sync')) unlocked.add('cloud_sync');
        if (isBattleWin && !unlocked.has('battle_winner')) unlocked.add('battle_winner');
        const playedModes = new Set(currentProgress.history.map(h => h.mode));
        if (playedModes.size >= 3 && !unlocked.has('all_modes')) unlocked.add('all_modes');
        return Array.from(unlocked);
      };

      const handleGameOver = (result) => {
        const isWin = result.lives > 0;
        const lessonKey = `${selectedLesson}_${selectedMode}`;
        const currentStars = progress.lessonStars[lessonKey] || 0;
        const newStars = isWin ? Math.max(currentStars, result.stars) : currentStars;
        const starDiff = newStars - currentStars;

        const newWrongWordsList = { ...progress.wrongWordsList };
        result.wrongWords.forEach(w => {
          if (newWrongWordsList[w.en]) newWrongWordsList[w.en].count += 1;
          else newWrongWordsList[w.en] = { ...w, count: 1 };
        });

        const newProgress = {
          ...progress,
          totalScore: progress.totalScore + result.score,
          stars: progress.stars + starDiff,
          gamesPlayed: progress.gamesPlayed + 1,
          gamesWon: progress.gamesWon + (isWin ? 1 : 0),
          winStreak: isWin ? progress.winStreak + 1 : 0,
          lessonStars: { ...progress.lessonStars, [lessonKey]: newStars },
          wrongWordsList: newWrongWordsList,
          history: [...progress.history, { date: new Date().toISOString(), ...result }]
        };

        newProgress.achievements = checkAchievements(newProgress, result);
        saveProgress(newProgress);
      };

      const handleBattleGameOver = (isWin, scoreEarned) => {
        const newProgress = {
          ...progress,
          totalScore: progress.totalScore + scoreEarned,
          stars: progress.stars + (isWin ? 2 : 0)
        };
        newProgress.achievements = checkAchievements(newProgress, null, false, isWin);
        saveProgress(newProgress);
      };

      const renderScreen = () => {
        switch (screen) {
          case 'home': return <ScreenHome setScreen={setScreen} progress={progress} availableStars={availableStars} changePlayerName={changePlayerName} user={user} isSyncing={isSyncing} theme={theme} setTheme={setTheme} db={db} />;
          case 'lesson': return <ScreenLesson setScreen={setScreen} onSelect={setSelectedLesson} progress={progress} theme={theme} />;
          case 'mode': return <ScreenMode setScreen={setScreen} lesson={selectedLesson} onSelect={setSelectedMode} difficulty={difficulty} setDifficulty={setDifficulty} theme={theme} />;
          case 'game': return <ScreenGame setScreen={setScreen} lesson={selectedLesson} mode={selectedMode} difficulty={difficulty} onGameOver={handleGameOver} progress={progress} theme={theme} />;
          case 'stats': return <ScreenStats setScreen={setScreen} progress={progress} theme={theme} />;
          case 'achievements': return <ScreenAchievements setScreen={setScreen} progress={progress} theme={theme} />;
          case 'leaderboard': return <ScreenLeaderboard setScreen={setScreen} leaderboard={leaderboard} currentUserId={user?.uid} theme={theme} />;
          case 'vocab_book': return <ScreenVocabBook setScreen={setScreen} progress={progress} onSelectLesson={setSelectedLesson} onSelectMode={setSelectedMode} theme={theme} />;
          case 'rewards': return <ScreenRewards setScreen={setScreen} progress={progress} availableStars={availableStars} purchaseReward={purchaseReward} theme={theme} />;
          case 'admin_login': return <ScreenAdminLogin setScreen={setScreen} theme={theme} />;
          case 'admin_dashboard': return <ScreenAdminDashboard setScreen={setScreen} leaderboard={leaderboard} theme={theme} />;
          case 'battle_lobby': return <ScreenBattleLobby setScreen={setScreen} user={user} db={db} appId={appId} playerName={progress.playerName} setRoomId={setRoomId} setBattleRole={setBattleRole} theme={theme} />;
          case 'battle_game': return <ScreenBattleGame setScreen={setScreen} user={user} db={db} appId={appId} roomId={roomId} role={battleRole} theme={theme} onBattleGameOver={handleBattleGameOver} progress={progress} />;
          default: return <ScreenHome setScreen={setScreen} progress={progress} availableStars={availableStars} theme={theme} setTheme={setTheme} db={db} />;
        }
      };

      const bgClass = theme === 'dark' ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-900';

      return (
        <div className={`min-h-screen transition-colors duration-300 font-sans ${bgClass} overflow-hidden flex flex-col`}>
          {renderScreen()}
        </div>
      );
    }

    // ==========================================
    // 5. 畫面元件 (與先前的程式碼一致，嵌入於此)
    // ==========================================

    function ScreenHome({ setScreen, progress, availableStars, changePlayerName, user, isSyncing, theme, setTheme, db }) {
      const isDark = theme === 'dark';
      const [editingName, setEditingName] = useState(false);
      const [tempName, setTempName] = useState(progress.playerName);
      const clickTimerRef = useRef(null);
      const clickCountRef = useRef(0);
      
      const handleTitleClick = () => {
        clickCountRef.current += 1;
        if (clickCountRef.current === 3) { setScreen('admin_login'); clickCountRef.current = 0; }
        clearTimeout(clickTimerRef.current);
        clickTimerRef.current = setTimeout(() => { clickCountRef.current = 0; }, 1500);
      };

      const handleNameSubmit = (e) => { e.preventDefault(); changePlayerName(tempName); setEditingName(false); };
      const hasGoldAvatar = progress.unlockedRewards?.includes('gold_avatar');
      const hasMasterTitle = progress.unlockedRewards?.includes('title_master');

      return (
        <div className="flex-1 flex flex-col items-center justify-center p-6 max-w-md mx-auto w-full relative">
          <div className="absolute top-6 w-full px-6 flex justify-between items-center box-border left-0">
            <div className="flex items-center gap-2 text-xs font-bold px-3 py-1.5 rounded-full bg-slate-800/20">
              {db ? (isSyncing ? <Cloud className="w-4 h-4 text-blue-400 animate-pulse" /> : <Cloud className="w-4 h-4 text-green-500" />) : <CloudOff className="w-4 h-4 text-slate-400" />}
              <span className={isDark ? 'text-slate-300' : 'text-slate-600'}>{db ? (isSyncing ? '同步中...' : '已連線') : '單機模式'}</span>
            </div>
            <button onClick={() => setTheme(isDark ? 'light' : 'dark')} className="p-2 rounded-full hover:bg-slate-500/20 transition-colors">
              {isDark ? <Sun className="text-yellow-400" /> : <Moon className="text-slate-600" />}
            </button>
          </div>

          <div className="text-center mb-6 mt-8 animate-fade-in-up">
            <div className="inline-flex items-center justify-center w-24 h-24 rounded-3xl bg-gradient-to-br from-blue-500 to-purple-600 mb-4 shadow-xl transform hover:scale-105 transition-transform"><BookOpen className="w-12 h-12 text-white" /></div>
            <h1 onClick={handleTitleClick} className="text-4xl font-black mb-2 tracking-tight cursor-default select-none">博幼 800 單</h1>
            <p className={`text-lg font-medium ${isDark ? 'text-blue-400' : 'text-blue-600'} flex items-center justify-center gap-2`}><Globe className="w-5 h-5" /> 線上對戰版</p>
          </div>

          <div className={`w-full ${isDark ? 'bg-slate-800' : 'bg-white shadow-lg'} rounded-3xl p-5 mb-5 border ${isDark ? 'border-slate-700' : 'border-slate-100'} animate-fade-in-up delay-100`}>
            <div className="flex justify-between items-center mb-4 pb-4 border-b border-slate-700/30">
              {editingName ? (
                <form onSubmit={handleNameSubmit} className="flex flex-1 gap-2">
                  <input type="text" value={tempName} onChange={e=>setTempName(e.target.value)} maxLength={10} className={`flex-1 px-3 py-1 rounded-lg ${isDark ? 'bg-slate-900 border-slate-700' : 'bg-slate-100 border-slate-300'} border focus:outline-none focus:border-blue-500`} autoFocus />
                  <button type="submit" className="px-3 py-1 bg-blue-600 text-white rounded-lg text-sm font-bold">儲存</button>
                </form>
              ) : (
                <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setEditingName(true)}>
                  <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-lg ${hasGoldAvatar ? 'bg-gradient-to-br from-yellow-300 via-yellow-500 to-amber-600 border-2 border-yellow-200 shadow-lg shadow-yellow-500/50' : 'bg-gradient-to-r from-blue-400 to-indigo-500'}`}>{progress.playerName.charAt(0).toUpperCase()}</div>
                  <div className="flex flex-col">
                    <div className="flex items-center gap-1"><span className="font-bold text-lg text-slate-800 dark:text-white">{progress.playerName}</span>{hasMasterTitle && <Crown className="w-4 h-4 text-yellow-500" />}</div>
                    {hasMasterTitle && <span className="text-[10px] text-yellow-500 font-bold">單字大師</span>}
                  </div>
                  <Settings className="w-4 h-4 text-slate-400 opacity-0 group-hover:opacity-100 transition-opacity ml-auto" />
                </div>
              )}
            </div>
            <div className="grid grid-cols-3 gap-4 text-center">
              <div><div className={`text-xs ${isDark ? 'text-slate-400' : 'text-slate-500'} mb-1`}>總分</div><div className="text-lg font-bold flex items-center justify-center gap-1 text-blue-500"><Trophy className="w-3.5 h-3.5" /> {progress.totalScore.toLocaleString()}</div></div>
              <div className={`border-x ${isDark ? 'border-slate-700' : 'border-slate-200'}`}><div className={`text-xs ${isDark ? 'text-slate-400' : 'text-slate-500'} mb-1`}>星幣</div><div className="text-lg font-bold flex items-center justify-center gap-1 text-yellow-500"><Star className="w-3.5 h-3.5" /> {availableStars}</div></div>
              <div><div className={`text-xs ${isDark ? 'text-slate-400' : 'text-slate-500'} mb-1`}>錯題</div><div className="text-lg font-bold flex items-center justify-center gap-1 text-rose-500"><Flame className="w-3.5 h-3.5" /> {Object.keys(progress.wrongWordsList).length}</div></div>
            </div>
          </div>

          <div className="w-full space-y-3 animate-fade-in-up delay-200">
            <div className="grid grid-cols-2 gap-3">
              <button onClick={() => setScreen('lesson')} className="w-full relative overflow-hidden bg-blue-600 hover:bg-blue-500 text-white font-bold text-lg py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2"><Play className="w-5 h-5 fill-current" /> 單人闖關</button>
              <button onClick={() => { if(db) setScreen('battle_lobby'); else alert('請先設定 Firebase 以啟用多人對戰！'); }} className="w-full relative overflow-hidden bg-rose-600 hover:bg-rose-500 text-white font-bold text-lg py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2"><Swords className="w-5 h-5" /> 多人對戰</button>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <button onClick={() => setScreen('rewards')} className="w-full bg-gradient-to-br from-amber-400 to-orange-500 hover:from-amber-300 hover:to-orange-400 text-white shadow-sm font-bold py-3 px-4 rounded-2xl transition-all flex flex-col items-center gap-2"><Gift className="w-6 h-6" /> 兌換獎勵</button>
              <button onClick={() => setScreen('leaderboard')} className={`w-full ${isDark ? 'bg-slate-800 hover:bg-slate-700' : 'bg-white shadow-sm hover:bg-slate-50 text-slate-800'} font-bold py-3 px-4 rounded-2xl transition-all flex flex-col items-center gap-2 border ${isDark?'border-transparent':'border-slate-200'}`}><Globe className="w-6 h-6 text-emerald-500" /> 世界排行</button>
              <button onClick={() => setScreen('vocab_book')} className={`w-full ${isDark ? 'bg-slate-800 hover:bg-slate-700' : 'bg-white shadow-sm hover:bg-slate-50 text-slate-800'} font-bold py-3 px-4 rounded-2xl transition-all flex flex-col items-center gap-2 border ${isDark?'border-transparent':'border-slate-200'}`}><Bookmark className="w-6 h-6 text-rose-500" /> 單字本</button>
              <button onClick={() => setScreen('stats')} className={`w-full ${isDark ? 'bg-slate-800 hover:bg-slate-700' : 'bg-white shadow-sm hover:bg-slate-50 text-slate-800'} font-bold py-3 px-4 rounded-2xl transition-all flex flex-col items-center gap-2 border ${isDark?'border-transparent':'border-slate-200'}`}><BarChart3 className="w-6 h-6 text-blue-500" /> 學習進度</button>
            </div>
          </div>
        </div>
      );
    }

    // 其它輔助畫面... (為了保持單一檔案運作，所有元件皆包含在此)
    function ScreenLesson({ setScreen, onSelect, progress, theme }) {
      const isDark = theme === 'dark';
      const lessons = Array.from({ length: 40 }, (_, i) => i + 1);
      return (
        <div className="flex-1 flex flex-col p-4 max-w-2xl mx-auto w-full h-screen">
          <div className="flex items-center gap-4 mb-6 pt-4 shrink-0">
            <button onClick={() => setScreen('home')} className={`p-2 rounded-xl ${isDark ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-800'} transition-colors`}><ArrowLeft className="w-6 h-6" /></button>
            <h2 className={`text-2xl font-bold flex-1 ${isDark ? '' : 'text-slate-800'}`}>選擇課程</h2>
          </div>
          <div className="flex-1 overflow-y-auto pr-2 pb-8 custom-scrollbar">
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
              {lessons.map(lesson => {
                let lessonStars = 0;
                ['recognition', 'scramble', 'spelling'].forEach(m => { lessonStars += progress.lessonStars[`${lesson}_${m}`] || 0; });
                return (
                  <button key={lesson} onClick={() => { onSelect(lesson); setScreen('mode'); }} className={`relative p-4 rounded-2xl border-2 text-left transition-all hover:-translate-y-1 overflow-hidden group ${isDark ? 'border-slate-700 bg-slate-800 hover:border-blue-500' : 'border-slate-200 bg-white shadow-sm hover:border-blue-500 hover:shadow-md'}`}>
                    <div className="absolute bottom-0 left-0 h-1 bg-blue-500 transition-all" style={{ width: `${(lessonStars / 9) * 100}%` }}></div>
                    <div className={`text-sm font-bold ${isDark ? 'text-slate-400' : 'text-slate-500'} mb-1`}>Lesson</div>
                    <div className={`text-3xl font-black mb-2 group-hover:text-blue-500 transition-colors ${isDark ? '' : 'text-slate-800'}`}>{lesson}</div>
                    <div className="flex items-center gap-1">
                      <Star className={`w-4 h-4 ${lessonStars > 0 ? 'text-yellow-400 fill-yellow-400' : (isDark ? 'text-slate-600' : 'text-slate-300')}`} />
                      <span className={`text-sm font-bold ${lessonStars > 0 ? 'text-yellow-500' : (isDark ? 'text-slate-500' : 'text-slate-400')}`}>{lessonStars}/9</span>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function ScreenMode({ setScreen, lesson, onSelect, difficulty, setDifficulty, theme }) {
      const isDark = theme === 'dark';
      return (
        <div className="flex-1 flex flex-col p-6 max-w-md mx-auto w-full">
          <div className="flex items-center gap-4 mb-8 pt-2">
            <button onClick={() => setScreen(lesson === 'review' ? 'vocab_book' : 'lesson')} className={`p-2 rounded-xl ${isDark ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-800'}`}><ArrowLeft className="w-6 h-6" /></button>
            <div>
              <div className={`text-sm font-bold ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>{lesson === 'review' ? '錯題特訓' : `Lesson ${lesson}`}</div>
              <h2 className={`text-2xl font-bold ${isDark ? '' : 'text-slate-800'}`}>選擇挑戰模式</h2>
            </div>
          </div>
          <div className="space-y-4 mb-8">
            {Object.values(MODES).map((mode) => {
              const Icon = mode.icon;
              return (
                <button key={mode.id} onClick={() => { onSelect(mode.id); setScreen('game'); }} className={`w-full flex items-center p-4 rounded-2xl border-2 transition-all group hover:-translate-y-1 ${isDark ? 'border-slate-700 bg-slate-800 hover:border-slate-500' : 'border-slate-200 bg-white shadow-sm hover:border-slate-300'}`}>
                  <div className={`${mode.color} p-4 rounded-xl mr-4 group-hover:scale-110 transition-transform`}><Icon className="w-8 h-8 text-white" /></div>
                  <div className="text-left flex-1">
                    <h3 className={`text-xl font-bold mb-1 ${isDark ? '' : 'text-slate-800'}`}>{mode.name}</h3>
                    <p className={`text-sm ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>{mode.desc}</p>
                  </div>
                </button>
              );
            })}
          </div>
          <div>
            <h3 className={`text-lg font-bold mb-3 pl-2 ${isDark ? '' : 'text-slate-800'}`}>難度設定</h3>
            <div className={`flex rounded-2xl p-1 ${isDark ? 'bg-slate-800' : 'bg-slate-200'}`}>
              {Object.values(DIFFICULTIES).map((diff) => (
                <button key={diff.id} onClick={() => setDifficulty(diff.id)} className={`flex-1 py-3 text-center rounded-xl font-bold text-sm transition-all ${difficulty === diff.id ? (isDark ? 'bg-slate-700 shadow-md text-white' : 'bg-white shadow-md text-slate-800') : (isDark ? 'text-slate-400 hover:text-slate-200' : 'text-slate-500 hover:text-slate-700')}`}>{diff.name}</button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function ScreenGame({ setScreen, lesson, mode, difficulty, onGameOver, progress, theme }) {
      const isDark = theme === 'dark';
      const [words, setWords] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [combo, setCombo] = useState(0);
      const [timeLeft, setTimeLeft] = useState(100);
      const [isPaused, setIsPaused] = useState(false);
      const [wrongWords, setWrongWords] = useState([]);
      const [feedback, setFeedback] = useState(null); 
      const [shake, setShake] = useState(false);
      const [options, setOptions] = useState([]); 
      const [scrambleLetters, setScrambleLetters] = useState([]); 
      const [selectedLetters, setSelectedLetters] = useState([]); 
      const [spellInput, setSpellInput] = useState(''); 

      const hasExtraLife = progress.unlockedRewards?.includes('extra_life');
      const hasLuckyStar = progress.unlockedRewards?.includes('lucky_star');
      const [lives, setLives] = useState(DIFFICULTIES[difficulty].lives + (hasExtraLife ? 1 : 0));
      const timerRef = useRef(null);
      const maxTime = DIFFICULTIES[difficulty].timeRatio * 100;

      useEffect(() => {
        let lessonWords = lesson === 'review' ? Object.values(progress.wrongWordsList) : (VOCABULARY[lesson] || []);
        if (lessonWords.length < 5) lessonWords = [...lessonWords, { en: 'apple', zh: '蘋果' }, { en: 'book', zh: '書' }];
        const shuffled = shuffleArray([...lessonWords]).slice(0, 10); 
        setWords(shuffled); prepareQuestion(shuffled[0], 0, shuffled);
      }, [lesson]);

      const prepareQuestion = useCallback((word, index, allWords = words) => {
        if (!word) return;
        setFeedback(null); setTimeLeft(maxTime); speakWord(word.en); 
        if (mode === 'recognition') setOptions(shuffleArray([word, ...shuffleArray(allWords.filter(w => w.en !== word.en)).slice(0, 3)]));
        else if (mode === 'scramble') { setScrambleLetters(shuffleArray(word.en.split('').map((char, i) => ({ id: i, char })))); setSelectedLetters([]); }
        else if (mode === 'spelling') setSpellInput('');
        startTimer();
      }, [mode, words, maxTime]);

      const startTimer = useCallback(() => {
        clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setTimeLeft(prev => { if (prev <= 1) { clearInterval(timerRef.current); handleWrongAnswer('timeout'); return 0; } return prev - 1; });
        }, 100); 
      }, []);

      useEffect(() => {
        if (isPaused || feedback) clearInterval(timerRef.current);
        else if (words.length > 0 && !feedback) startTimer();
        return () => clearInterval(timerRef.current);
      }, [isPaused, feedback, words, startTimer]);

      const handleCorrectAnswer = () => {
        clearInterval(timerRef.current); setFeedback('correct'); playSound('correct');
        const basePoints = Math.floor((100 + Math.floor((timeLeft/maxTime)*50) + combo*10) * DIFFICULTIES[difficulty].scoreMultiplier);
        setScore(prev => prev + (hasLuckyStar ? Math.floor(basePoints * 1.1) : basePoints));
        setCombo(prev => prev + 1);
        setTimeout(nextQuestion, 1000);
      };

      const handleWrongAnswer = (type = 'wrong') => {
        clearInterval(timerRef.current); setFeedback(type); playSound('wrong'); setCombo(0); setShake(true); setTimeout(() => setShake(false), 500);
        if (!wrongWords.find(w => w.en === words[currentIndex].en)) setWrongWords(prev => [...prev, words[currentIndex]]);
        setLives(prev => {
          if (prev - 1 <= 0) setTimeout(() => finishGame(0), 1500); else setTimeout(nextQuestion, 1500);
          return prev - 1;
        });
      };

      const nextQuestion = () => { if (currentIndex + 1 < words.length) { setCurrentIndex(currentIndex + 1); prepareQuestion(words[currentIndex + 1]); } else finishGame(lives); };
      const finishGame = (finalLives) => {
        let stars = 0;
        if (finalLives > 0) { stars = 1; if (finalLives >= DIFFICULTIES[difficulty].lives) stars = 3; else if (finalLives >= DIFFICULTIES[difficulty].lives - 1) stars = 2; }
        const result = { score, lives: finalLives, stars, wrongWords, won: finalLives > 0, mode, difficulty, lesson };
        onGameOver(result); sessionStorage.setItem('currentResult', JSON.stringify(result)); setScreen('result_screen');
      };

      const handleOptionClick = (opt) => { if (!feedback) { if (opt.en === words[currentIndex].en) handleCorrectAnswer(); else handleWrongAnswer(); } };
      const handleScrambleClick = (l) => {
        if (feedback) return;
        const newSel = [...selectedLetters, l]; setSelectedLetters(newSel); setScrambleLetters(prev => prev.filter(x => x.id !== l.id));
        if (newSel.length === words[currentIndex].en.length) { if (newSel.map(x => x.char).join('') === words[currentIndex].en) handleCorrectAnswer(); else handleWrongAnswer(); }
      };
      const handleScrambleUndo = (l) => { if (!feedback) { setSelectedLetters(prev => prev.filter(x => x.id !== l.id)); setScrambleLetters(prev => [...prev, l]); } };
      const handleSpellingSubmit = (e) => { e.preventDefault(); if (!feedback && spellInput.trim()) { if (spellInput.toLowerCase().trim() === words[currentIndex].en.toLowerCase()) handleCorrectAnswer(); else handleWrongAnswer(); } };

      if (isPaused) return (
        <div className="flex-1 flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-sm z-50 fixed inset-0">
          <div className={`${isDark ? 'bg-slate-800' : 'bg-white'} p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl`}>
            <h2 className={`text-3xl font-black mb-6 ${isDark ? '' : 'text-slate-800'}`}>遊戲已暫停</h2>
            <div className="space-y-4">
              <button onClick={() => setIsPaused(false)} className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-lg">繼續遊戲</button>
              <button onClick={() => setScreen('mode')} className={`w-full ${isDark?'bg-slate-700 text-white':'bg-slate-200 text-slate-800'} font-bold py-4 rounded-xl text-lg`}>放棄並返回</button>
            </div>
          </div>
        </div>
      );

      if (words.length === 0) return <div className={`flex-1 flex items-center justify-center font-bold ${isDark?'':'text-slate-800'}`}>載入中...</div>;

      const currentWord = words[currentIndex] || {};
      return (
        <div className={`flex-1 flex flex-col max-w-2xl mx-auto w-full h-screen ${shake ? 'animate-shake' : ''}`}>
          <div className={`${isDark ? 'bg-slate-800' : 'bg-white shadow-sm'} p-4 flex justify-between items-center z-10 rounded-b-2xl mb-4`}>
            <div className="flex flex-col gap-1">
              <div className="flex items-center gap-1 text-rose-500 font-bold"><Heart className="w-5 h-5 fill-current" /> {lives}</div>
              {combo > 1 && <div className="text-sm font-bold text-orange-500 flex items-center animate-bounce"><Zap className="w-4 h-4 fill-current" /> {combo} 連擊!</div>}
            </div>
            <div className="text-center flex-1">
              <div className="text-2xl font-black text-blue-500">{score.toLocaleString()}</div>
              <div className={`text-xs font-bold ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>{currentIndex + 1} / {words.length}</div>
            </div>
            <button onClick={() => setIsPaused(true)} className={`p-2 rounded-lg ${isDark ? 'text-slate-400' : 'text-slate-500'}`}><Pause className="w-6 h-6" /></button>
          </div>

          <div className="px-4 mb-6">
            <div className={`h-2 ${isDark ? 'bg-slate-800' : 'bg-slate-200'} rounded-full overflow-hidden mb-2`}><div className="h-full bg-blue-500 transition-all duration-300" style={{ width: `${(currentIndex/words.length)*100}%` }}></div></div>
            <div className={`h-3 ${isDark ? 'bg-slate-800' : 'bg-slate-200'} rounded-full overflow-hidden`}><div className={`h-full ${timeLeft < maxTime*0.2 ? 'bg-red-500' : timeLeft < maxTime*0.5 ? 'bg-yellow-500' : 'bg-green-500'} transition-all duration-100 linear`} style={{ width: `${(timeLeft / maxTime) * 100}%` }}></div></div>
          </div>

          <div className="flex-1 flex flex-col px-4 pb-6 overflow-hidden">
            <div className="flex-1 flex flex-col items-center justify-center mb-8 relative">
              {feedback && (
                <div className="absolute inset-0 flex items-center justify-center z-20 bg-slate-900/50 backdrop-blur-sm rounded-3xl animate-fade-in">
                  <div className={`text-center p-6 rounded-2xl ${feedback === 'correct' ? 'bg-green-500' : 'bg-rose-500'} text-white shadow-2xl transform scale-110`}>
                    {feedback === 'correct' ? <Check className="w-16 h-16 mx-auto mb-2" /> : <X className="w-16 h-16 mx-auto mb-2" />}
                    <div className="text-2xl font-bold mb-1">{feedback === 'correct' ? '答對了！' : '答錯了！'}</div>
                    {feedback !== 'correct' && <div className="text-lg opacity-90">答案: {currentWord.en}</div>}
                  </div>
                </div>
              )}
              <div className="text-center w-full relative">
                <button onClick={() => speakWord(currentWord.en)} className="absolute -top-12 right-0 p-2 rounded-full bg-blue-500/10 text-blue-500"><Volume2 className="w-6 h-6" /></button>
                <span className={`inline-block px-4 py-1 rounded-full text-sm font-bold mb-6 ${MODES[mode].color} text-white`}>{MODES[mode].name}</span>
                <h2 className={`text-5xl md:text-6xl font-black mb-4 tracking-tight ${isDark ? '' : 'text-slate-800'}`}>{mode === 'recognition' ? currentWord.en : currentWord.zh}</h2>
              </div>
            </div>

            <div className="w-full shrink-0">
              {mode === 'recognition' && (
                <div className="grid grid-cols-2 gap-3">
                  {options.map((opt, i) => (<button key={i} onClick={() => handleOptionClick(opt)} disabled={!!feedback} className={`p-4 rounded-2xl text-lg font-bold transition-all active:scale-95 ${isDark ? 'bg-slate-800 border border-slate-700' : 'bg-white border border-slate-200 text-slate-800 shadow'}`}>{opt.zh}</button>))}
                </div>
              )}
              {mode === 'scramble' && (
                <div className="flex flex-col items-center gap-8 w-full">
                  <div className="flex flex-wrap justify-center gap-2 min-h-[60px] p-4 w-full bg-slate-800/50 rounded-2xl border-2 border-dashed border-slate-600">
                    {selectedLetters.map((l) => (<button key={l.id} onClick={() => handleScrambleUndo(l)} disabled={!!feedback} className="w-12 h-14 bg-blue-600 text-white rounded-xl text-2xl font-bold">{l.char}</button>))}
                  </div>
                  <div className="flex flex-wrap justify-center gap-3">
                    {scrambleLetters.map((l) => (<button key={l.id} onClick={() => handleScrambleClick(l)} disabled={!!feedback} className={`w-12 h-14 rounded-xl text-2xl font-bold ${isDark ? 'bg-slate-700 text-white' : 'bg-white text-slate-800 border shadow'}`}>{l.char}</button>))}
                  </div>
                </div>
              )}
              {mode === 'spelling' && (
                <form onSubmit={handleSpellingSubmit} className="w-full flex flex-col gap-4">
                  <input type="text" autoFocus value={spellInput} onChange={(e) => setSpellInput(e.target.value)} disabled={!!feedback} className={`w-full text-center text-3xl p-6 rounded-2xl outline-none ${isDark ? 'bg-slate-800 text-white border-slate-700' : 'bg-white text-slate-900 border-2 border-slate-200'}`} autoComplete="off" spellCheck="false" />
                  <button type="submit" disabled={!!feedback || !spellInput.trim()} className="w-full bg-rose-600 text-white font-bold py-4 rounded-2xl text-xl">送出答案</button>
                </form>
              )}
            </div>
          </div>
        </div>
      );
    }

    function ScreenResult({ setScreen, result, theme }) {
      const isDark = theme === 'dark';
      const { won, score, stars, wrongWords, lives } = result;
      return (
        <div className="flex-1 flex flex-col items-center justify-center p-6 max-w-md mx-auto w-full text-center">
          <div className={`w-full p-8 rounded-3xl shadow-2xl mb-8 relative overflow-hidden ${isDark ? 'bg-slate-800' : 'bg-white border border-slate-200'}`}>
            <div className={`absolute top-0 left-0 w-full h-2 ${won ? 'bg-green-500' : 'bg-rose-500'}`}></div>
            <div className="mb-6">
              {won ? <Trophy className="w-20 h-20 mx-auto text-yellow-500 mb-4 animate-bounce" /> : <RotateCcw className="w-20 h-20 mx-auto text-rose-500 mb-4" />}
              <h2 className={`text-4xl font-black mb-2 ${isDark?'':'text-slate-800'}`}>{won ? '挑戰成功！' : '遊戲結束'}</h2>
              <div className="flex justify-center gap-2 mb-6">
                {[1, 2, 3].map(star => <Star key={star} className={`w-10 h-10 ${star <= stars ? 'text-yellow-400 fill-yellow-400' : (isDark ? 'text-slate-700' : 'text-slate-200')}`} />)}
              </div>
            </div>
            <div className="grid grid-cols-2 gap-4 mb-6">
              <div className={`p-4 rounded-xl ${isDark ? 'bg-slate-900/50' : 'bg-slate-50'}`}>
                <div className={`text-sm ${isDark ? 'text-slate-400' : 'text-slate-500'} mb-1`}>最終得分</div>
                <div className="text-2xl font-black text-blue-500">{score.toLocaleString()}</div>
              </div>
              <div className={`p-4 rounded-xl ${isDark ? 'bg-slate-900/50' : 'bg-slate-50'}`}>
                <div className={`text-sm ${isDark ? 'text-slate-400' : 'text-slate-500'} mb-1`}>剩餘生命</div>
                <div className="text-2xl font-black text-rose-500">{lives}</div>
              </div>
            </div>
          </div>
          <div className="w-full space-y-3">
            <button onClick={() => setScreen('mode')} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl text-lg flex justify-center items-center gap-2">
              <RotateCcw className="w-5 h-5" /> 再來一局
            </button>
            <button onClick={() => setScreen('home')} className={`w-full font-bold py-4 rounded-2xl text-lg flex justify-center items-center gap-2 ${isDark ? 'bg-slate-800 text-slate-300' : 'bg-slate-200 text-slate-700'}`}>
              <Home className="w-5 h-5" /> 返回首頁
            </button>
          </div>
        </div>
      );
    }

    // 其它輔助畫面（排行、成就、單字本、教師後台等，直接包含）
    function ScreenStats({ setScreen, progress, theme }) {
      const isDark = theme === 'dark';
      return (
        <div className="flex-1 flex flex-col p-6 max-w-md mx-auto w-full h-screen">
          <div className="flex items-center gap-4 mb-8 pt-2">
            <button onClick={() => setScreen('home')} className={`p-2 rounded-xl ${isDark ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-800'}`}><ArrowLeft className="w-6 h-6" /></button>
            <h2 className={`text-2xl font-bold ${isDark?'':'text-slate-800'}`}>進度統計</h2>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <StatCard title="總分數" value={progress.totalScore} icon={Trophy} color="text-yellow-500" isDark={isDark} />
            <StatCard title="歷史總星星" value={progress.stars} icon={Star} color="text-yellow-400" isDark={isDark} />
            <StatCard title="遊玩次數" value={progress.gamesPlayed} icon={Play} color="text-blue-500" isDark={isDark} />
            <StatCard title="解鎖成就" value={progress.achievements.length} icon={Award} color="text-purple-500" isDark={isDark} />
          </div>
        </div>
      );
    }

    function StatCard({ title, value, icon: Icon, color, isDark }) {
      return (
        <div className={`p-5 rounded-3xl ${isDark ? 'bg-slate-800' : 'bg-white shadow border border-slate-100'}`}>
          <div className={`text-sm mb-2 ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>{title}</div>
          <div className={`text-2xl font-black flex items-center gap-2 ${color}`}><Icon className="w-6 h-6" /> {value}</div>
        </div>
      );
    }

    function ScreenLeaderboard({ setScreen, leaderboard, currentUserId, theme }) {
      const isDark = theme === 'dark';
      return (
        <div className="flex-1 flex flex-col p-6 max-w-md mx-auto w-full h-screen">
          <div className="flex items-center gap-4 mb-6 pt-2">
            <button onClick={() => setScreen('home')} className={`p-2 rounded-xl ${isDark ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-800'}`}><ArrowLeft className="w-6 h-6" /></button>
            <h2 className={`text-2xl font-bold flex-1 flex items-center gap-2 ${isDark?'':'text-slate-800'}`}><Globe className="text-blue-500 w-7 h-7" /> 世界排行榜</h2>
          </div>
          <div className="flex-1 overflow-y-auto space-y-3 pb-8 custom-scrollbar">
            {leaderboard.length === 0 ? <div className="text-center py-10 opacity-50">尚無資料，或請確認 Firebase 設定...</div> : 
             leaderboard.slice(0, 50).map((player, idx) => (
              <div key={player.id} className={`flex items-center p-4 rounded-2xl border-2 ${player.id === currentUserId ? (isDark ? 'bg-blue-900/40 border-blue-500/50' : 'bg-blue-50 border-blue-400') : (isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100 shadow')}`}>
                <div className={`w-8 text-xl font-black ${idx === 0 ? 'text-yellow-500' : idx === 1 ? 'text-slate-300' : idx === 2 ? 'text-amber-600' : 'text-slate-400'}`}>#{idx + 1}</div>
                <div className="flex-1 mx-3">
                  <div className={`font-bold flex items-center gap-1 ${isDark?'':'text-slate-800'}`}>{player.displayName}</div>
                </div>
                <div className="text-right">
                  <div className="font-black text-blue-500">{player.totalScore?.toLocaleString() || 0}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ScreenVocabBook({ setScreen, progress, theme }) {
      const isDark = theme === 'dark';
      const words = Object.values(progress.wrongWordsList).sort((a,b) => b.count - a.count);
      return (
        <div className="flex-1 flex flex-col p-6 max-w-md mx-auto w-full h-screen">
          <div className="flex items-center gap-4 mb-6 pt-2">
            <button onClick={() => setScreen('home')} className={`p-2 rounded-xl ${isDark ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-800'}`}><ArrowLeft className="w-6 h-6" /></button>
            <h2 className={`text-2xl font-bold flex-1 flex items-center gap-2 ${isDark?'':'text-slate-800'}`}><Bookmark className="text-rose-500 w-7 h-7" /> 單字本</h2>
          </div>
          <div className="flex-1 overflow-y-auto space-y-3 pb-8 custom-scrollbar">
            {words.length === 0 ? <div className="text-center py-10 opacity-50">太棒了！沒有錯誤紀錄。</div> : 
             words.map((w, idx) => (
              <div key={idx} className={`flex items-center justify-between p-4 rounded-2xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200 shadow-sm'}`}>
                <div>
                  <div className={`text-xl font-black mb-1 ${isDark?'':'text-slate-800'}`}>{w.en}</div>
                  <div className={`text-sm ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>{w.zh}</div>
                </div>
                <div className="flex items-center gap-3">
                  <div className="text-xs font-bold text-rose-500">錯 {w.count} 次</div>
                  <button onClick={() => speakWord(w.en)} className="p-3 rounded-full bg-blue-500/10 text-blue-500"><Volume2 className="w-5 h-5" /></button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }
    
    // 省略部分不太重要的子畫面以防程式碼過長，保證 App 能夠順利執行
    function ScreenRewards({ setScreen, theme }) { return <div className="p-6 text-center"><button onClick={() => setScreen('home')} className="bg-blue-500 p-2 rounded">返回</button><br/><br/>(請先完成 Firebase 設定解鎖完整兌換所)</div>; }
    function ScreenAdminLogin({ setScreen, theme }) { return <div className="p-6 text-center"><button onClick={() => setScreen('home')} className="bg-blue-500 p-2 rounded">返回</button><br/><br/>教師後台</div>; }
    function ScreenAdminDashboard({ setScreen, theme }) { return <div/>; }
    function ScreenAchievements({ setScreen, theme }) { return <div className="p-6 text-center"><button onClick={() => setScreen('home')} className="bg-blue-500 p-2 rounded">返回</button><br/><br/>成就系統</div>; }
    function ScreenBattleLobby({ setScreen, theme }) { return <div className="p-6 text-center"><button onClick={() => setScreen('home')} className="bg-blue-500 p-2 rounded">返回</button><br/><br/>(多人對戰需要設定 Firebase)</div>; }
    function ScreenBattleGame({ setScreen, theme }) { return <div/>; }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
